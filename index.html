<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wig Stack!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        #game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: #ecf0f1;
            touch-action: none;
            image-rendering: auto;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- ファイル読み込み順厳守 -->
    <script src="game.js?v=1.0.1"></script>
    <script src="data.js?v=1.0.1"></script>
    <script src="enemies.js?v=1.0.1"></script>
    <script src="blessings.js?v=1.0.1"></script>
    <script src="systems.js?v=1.0.1"></script>
    <script src="nodemap.js?v=1.0.1"></script>
    <script src="ui.js?v=1.0.1"></script>
    <script src="ui_screens.js?v=1.0.1"></script>
    <script src="update.js?v=1.0.1"></script>
    <script src="render.js?v=1.0.1"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カツラ・スタック・パズル DX</title>
    <style>
        body { 
            text-align: center; 
            background: #2c3e50; 
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            overflow: hidden; 
            margin: 0;
            padding: 0;
        }
        canvas { 
            background: #ecf0f1; 
            border: 10px solid #34495e; 
            display: block; 
            margin: 10px auto; 
            touch-action: none; 
            cursor: none;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw;
            max-height: 80vh;
        }
        .ui {
            padding: 10px;
            background: rgba(0,0,0,0.3);
        }
        .score-board {
            font-size: 28px;
            font-weight: bold;
            color: #f1c40f;
        }
        .gold-msg {
            color: #ffd700;
            font-size: 14px;
            margin-top: 5px;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }
        .start-btn {
            background: #f1c40f;
            color: #2c3e50;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <button class="start-btn">ゲームスタート！<br><span style="font-size: 14px;">(クリックで音が出ます)</span></button>
    </div>

    <div class="ui">
        <div class="score-board">スコア: <span id="score">0</span></div>
        <div class="gold-msg">★3つ揃うと専用の喜び画像が登場！★</div>
    </div>
    <canvas id="gameCanvas" width="450" height="650"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const overlay = document.getElementById("overlay");

        const IMAGES = {
            // 基本素材
            player: "https://lh3.googleusercontent.com/d/1X4TVETZOhC-oAwbw5JyCZepYi_Vz7tF9",
            playerHappy: "https://lh3.googleusercontent.com/d/1t0BivW_lIqrmhiG0pQ6pu6siAOPXF4G2",
            // カツラ単体
            regent: "https://lh3.googleusercontent.com/d/1YxsFzbDgTLYyPRCk94DglTlpgSSSKpXC",
            blonde: "https://lh3.googleusercontent.com/d/1uvqwT2fdexv5CtjaAsWU8G1dPpXFkpDG",
            red: "https://lh3.googleusercontent.com/d/1amjNs9G79dYgRT01VXaZgnFyn1GAKeAk",
            bob: "https://lh3.googleusercontent.com/d/1boedCmWqlYJuMehThRESo9Sm801kp-9t",
            afro: "https://lh3.googleusercontent.com/d/1hYhUw1qbQ-rhivj1RU2wX07_t8pAIf_v",
            // 揃った時の喜び画像（カットイン用）
            happy_afro: "https://lh3.googleusercontent.com/d/1pak7rIcJ7s3STyVO-PCLtDb760fnwCjE",
            happy_red: "https://lh3.googleusercontent.com/d/1kdIhsDBgWW2NhBmqAQZFzfbvvb22Cw2Z",
            happy_regent: "https://lh3.googleusercontent.com/d/1iNoVnuWJRKtM0nK65YMYTbw9MebMp1ga",
            happy_bob: "https://lh3.googleusercontent.com/d/1xxMSDjtAG3w0eQiWtFSlO_HIRN02rXRy",
            happy_blonde: "https://lh3.googleusercontent.com/d/1C0WWD1V0bCTN73_Pyk55jSvX6DeVa-Un"
        };

        const loadedImages = {};
        let imagesToLoadCount = Object.keys(IMAGES).length;

        for (let key in IMAGES) {
            loadedImages[key] = new Image();
            loadedImages[key].crossOrigin = "anonymous";
            loadedImages[key].src = IMAGES[key];
            loadedImages[key].onload = () => { imagesToLoadCount--; };
            loadedImages[key].onerror = () => { console.error("Load failed: " + key); };
        }

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSfx(freq, type = 'sine', duration = 0.1) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        let score = 0;
        const WIG_W = 100; 
        const WIG_H = 65;  
        const STACK_OFFSET = 25; 
        const WIG_TYPES = ['regent', 'blonde', 'red', 'bob', 'afro'];
        
        const player = {
            x: 187, y: 520, w: 75, h: 75,
            stack: [], isHappy: false, happyTimer: 0, facingRight: false 
        };

        const cutIn = {
            active: false,
            timer: 0,
            wigType: null,
            duration: 50 
        };

        let fallingWigs = [];
        let mouseX = 225;
        let isGameRunning = false;
        let spawnTimer = null;

        function setMousePos(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const newMouseX = (clientX - rect.left) * scaleX;
            if (newMouseX > mouseX + 1) player.facingRight = true;
            else if (newMouseX < mouseX - 1) player.facingRight = false;
            mouseX = newMouseX;
        }

        canvas.addEventListener("mousemove", (e) => setMousePos(e.clientX));
        canvas.addEventListener("touchmove", (e) => {
            setMousePos(e.touches[0].clientX);
            e.preventDefault();
        }, {passive: false});

        function spawnWig() {
            if (!isGameRunning) return;
            const rand = Math.random();
            let type, isGold = false, isObstacle = false;

            if (rand < 0.15) { 
                type = 'afro'; 
                isObstacle = true;
            } else if (rand < 0.25) { 
                type = 'red';
                isGold = true;
            } else {
                type = WIG_TYPES[Math.floor(Math.random() * WIG_TYPES.length)];
            }
            
            fallingWigs.push({
                x: Math.random() * (canvas.width - WIG_W),
                y: -WIG_H,
                type: type,
                isGold: isGold,
                isObstacle: isObstacle,
                rotation: (Math.random() - 0.5) * 0.2
            });
        }

        function update() {
            if (!isGameRunning) return;

            let targetX = mouseX - player.w / 2;
            player.x = Math.max(0, Math.min(canvas.width - player.w, targetX));

            if (player.happyTimer > 0) {
                player.happyTimer--;
                if (player.happyTimer === 0) player.isHappy = false;
            }

            if (cutIn.active) {
                cutIn.timer--;
                if (cutIn.timer <= 0) cutIn.active = false;
            }

            for (let i = fallingWigs.length - 1; i >= 0; i--) {
                let w = fallingWigs[i];
                w.y += 4;
                
                let currentStackTopY = player.y - (player.stack.length * STACK_OFFSET) + 20;
                
                if (w.y + WIG_H * 0.8 >= currentStackTopY && 
                    w.x + WIG_W * 0.8 > player.x && 
                    w.x + WIG_W * 0.2 < player.x + player.w) {
                    
                    const caughtWig = fallingWigs.splice(i, 1)[0];
                    
                    if (caughtWig.isGold) {
                        playSfx(880, 'square', 0.3);
                        if (player.stack.length > 0) player.stack.pop();
                        if (player.stack.length > 0) player.stack.pop();
                        score += 200;
                        triggerHappy();
                    } else if (caughtWig.isObstacle) {
                        playSfx(80, 'sawtooth', 0.4); 
                        player.stack.push({ type: caughtWig.type, isObstacle: true });
                    } else {
                        playSfx(440, 'sine', 0.1);
                        player.stack.push({ type: caughtWig.type, isObstacle: false });
                        checkMatch();
                    }
                    scoreElement.innerText = score;
                }
                if (w.y > canvas.height) fallingWigs.splice(i, 1);
            }

            if (player.y - (player.stack.length * STACK_OFFSET) < 20) {
                gameOver();
            }
        }

        function checkMatch() {
            const s = player.stack;
            if (s.length >= 3) {
                const t1 = s[s.length - 1];
                const t2 = s[s.length - 2];
                const t3 = s[s.length - 3];
                
                if (!t1.isObstacle && !t2.isObstacle && !t3.isObstacle) {
                    if (t1.type === t2.type && t2.type === t3.type) {
                        const matchedType = t1.type;
                        s.splice(s.length - 3, 3);
                        score += 1000;
                        playSfx(1200, 'triangle', 0.5);
                        triggerHappy();
                        
                        // カットイン設定
                        cutIn.active = true;
                        cutIn.timer = cutIn.duration;
                        cutIn.wigType = matchedType;
                    }
                }
            }
        }

        function triggerHappy() {
            player.isHappy = true;
            player.happyTimer = 90;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0, "#dfe6e9");
            grad.addColorStop(1, "#b2bec3");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width, canvas.height);

            ctx.save();
            let pImg = player.isHappy ? loadedImages.playerHappy : loadedImages.player;
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            if (player.facingRight) ctx.scale(-1, 1);
            if (player.isHappy) ctx.translate(0, Math.sin(Date.now() * 0.02) * 8);
            ctx.drawImage(pImg, -player.w / 2, -player.h / 2, player.w, player.h);
            ctx.restore();

            player.stack.forEach((item, i) => {
                const drawY = player.y - (i + 1) * STACK_OFFSET + 15;
                drawWigItem(item.type, player.x + (player.w - WIG_W)/2, drawY, 0, false, item.isObstacle);
            });

            fallingWigs.forEach(w => {
                drawWigItem(w.type, w.x, w.y, w.rotation, w.isGold, w.isObstacle);
            });

            if (cutIn.active) {
                drawCutIn();
            }
        }

        function drawCutIn() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const size = 320; 

            const alpha = Math.min(1, cutIn.timer / 10); 
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            const scale = 1.0 + Math.sin((cutIn.duration - cutIn.timer) * 0.15) * 0.05;
            ctx.translate(centerX, centerY);
            ctx.scale(scale, scale);
            
            // 揃った髪型に対応した喜び画像キーを作成
            const happyKey = "happy_" + cutIn.wigType;
            const img = loadedImages[happyKey] || loadedImages.playerHappy;
            
            ctx.drawImage(img, -size/2, -size/2, size, size);
            ctx.restore();

            ctx.save();
            ctx.font = "bold 44px Arial";
            ctx.fillStyle = "#f1c40f";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 6;
            ctx.textAlign = "center";
            ctx.strokeText("NICE COMBO!!", centerX, centerY + size/2 + 20);
            ctx.fillText("NICE COMBO!!", centerX, centerY + size/2 + 20);
            ctx.restore();
        }

        function drawWigItem(type, x, y, rot, isGold, isObstacle) {
            ctx.save();
            ctx.translate(x + WIG_W/2, y + WIG_H/2);
            ctx.rotate(rot);
            
            if (isGold) {
                ctx.filter = "brightness(1.5) sepia(1) saturate(10) hue-rotate(10deg) drop-shadow(0 0 8px gold)";
            } else if (isObstacle) {
                ctx.filter = "grayscale(1) brightness(0.2) contrast(2) drop-shadow(0 0 4px #000)";
            }

            if (loadedImages[type]) {
                ctx.drawImage(loadedImages[type], -WIG_W/2, -WIG_H/2, WIG_W, WIG_H);
            }
            ctx.restore();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(spawnTimer);
            alert("カツラが溢れました！ スコア: " + score);
            player.stack = [];
            score = 0;
            scoreElement.innerText = score;
            fallingWigs = [];
            mouseX = canvas.width / 2;
            overlay.style.display = 'flex';
        }

        overlay.addEventListener("click", () => {
            initAudio();
            overlay.style.display = 'none';
            if (imagesToLoadCount <= 0) {
                isGameRunning = true;
                if (spawnTimer) clearInterval(spawnTimer);
                spawnTimer = setInterval(spawnWig, 1000);
            }
        });

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
